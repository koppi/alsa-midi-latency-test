name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    name: Build .deb for ${{ matrix.distro }} ${{ matrix.codename }} (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu
          - distro: ubuntu
            codename: noble
            version: "24.04"
            arch: amd64
          - distro: ubuntu
            codename: noble
            version: "24.04"
            arch: arm64
          - distro: ubuntu
            codename: resolute
            version: "26.04"
            arch: amd64
          - distro: ubuntu
            codename: resolute
            version: "26.04"
            arch: arm64
          # Debian
          - distro: debian
            codename: trixie
            version: "13"
            arch: amd64
          - distro: debian
            codename: trixie
            version: "13"
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Build package
        run: |
          ARCH="${{ matrix.arch }}"
          CODENAME="${{ matrix.codename }}"
          VERSION="${{ github.ref_name }}-1${CODENAME}"
          PLATFORM="linux/amd64"
          [ "$ARCH" = "arm64" ] && PLATFORM="linux/arm64/v8"

          WORKSPACE_PARENT="$(dirname "$GITHUB_WORKSPACE")"
          REPO_DIR="$(basename "$GITHUB_WORKSPACE")"

            docker run --platform "$PLATFORM" --rm \
            -v "${WORKSPACE_PARENT}:/workspace" \
            -w "/workspace/${REPO_DIR}" \
            -e VERSION="${VERSION}" \
            -e CODENAME="${CODENAME}" \
            -e REPO_DIR="${REPO_DIR}" \
            -e DISTRO="${{ matrix.distro }}" \
            ${{ matrix.distro }}:"${CODENAME}" bash -ec '
            export DEBIAN_FRONTEND=noninteractive
            if [ "$DISTRO" = "debian" ] && [ "$CODENAME" = "buster" ]; then
              echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
              echo "deb http://archive.debian.org/debian-security buster/updates main" >> /etc/apt/sources.list
            fi
            apt-get update -qq
            apt-get install -y -qq build-essential devscripts debhelper dh-make equivs
            mk-build-deps -i -t "apt --yes --no-install-recommends"
            sed -i "1s/.*/alsa-midi-latency-test (${VERSION}) ${CODENAME}; urgency=medium/" debian/changelog
            dpkg-buildpackage -b -rfakeroot -uc -us -d
            mkdir -p "/workspace/${REPO_DIR}/deb-output"
            find /workspace -path "*/deb-output" -prune -o -type f \( -name "*.deb" -o -name "*.ddeb" -o -name "*.dsc" \) -print | while read -r f; do cp "$f" "/workspace/${REPO_DIR}/deb-output/"; done
            '
        env:
          DEB_BUILD_OPTIONS: nocheck

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ccm-deb-${{ matrix.distro }}-${{ matrix.codename }}-${{ matrix.arch }}
          path: deb-output/
          if-no-files-found: ignore

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Flatten artifact directories
        run: |
          mkdir -p release-packages
          find artifacts -type f \( -name "*.deb" -o -name "*.ddeb" -o -name "*.dsc" \) | while read -r file; do
            cp "$file" release-packages/
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-packages/*
          generate_release_notes: true
